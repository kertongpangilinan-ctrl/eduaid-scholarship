# Cache bust: 2025-nginx-fpm-v1
[phases.setup]
nixPkgs = ["php", "phpPackages.composer", "phpPackages.php-fpm", "nodejs_22", "npm-10_x", "nginx", "libmysqlclient", "gettext"]

[phases.install]
cmds = [
  "mkdir -p /var/log/nginx",
  "mkdir -p /var/cache/nginx",
  "mkdir -p bootstrap/cache",
  "chmod -R 777 bootstrap/cache storage",
  "composer install --ignore-platform-reqs --no-dev --no-scripts",
  "npm install --legacy-peer-deps"
]

[phases.build]
cmds = [
  "npm run build",
  "chmod +x /app/start.sh"
]

[start]
cmd = "/app/start.sh"

[healthcheck]
path = "/"
timeout = 300

[variables]
APP_URL = "https://eduaid-scholarship-production.up.railway.app"
APP_KEY = "base64:abcdefghijklmnopqrstuvwxyz1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ"
