# Cache bust: 2024-04-13-v2
[phases.setup]
nixPkgs = ["php", "phpPackages.composer", "nodejs_22", "npm-10_x", "nginx", "libmysqlclient"]

[phases.install]
cmds = [
  "mkdir -p /var/log/nginx",
  "mkdir -p /var/cache/nginx",
  "mkdir -p bootstrap/cache",
  "chmod -R 777 bootstrap/cache",
  "composer install --ignore-platform-reqs --no-dev --no-scripts",
  "npm install --legacy-peer-deps"
]

[phases.build]
cmds = [
  "npm run build"
]

[start]
cmd = "sh -c 'echo \"APP_NAME=Laravel\" > .env && echo \"APP_ENV=production\" >> .env && echo \"APP_KEY=$APP_KEY\" >> .env && echo \"APP_DEBUG=false\" >> .env && echo \"APP_URL=$APP_URL\" >> .env && echo \"DB_CONNECTION=mysql\" >> .env && echo \"DB_HOST=${DB_HOST#*=}\" >> .env && echo \"DB_PORT=${DB_PORT#*=}\" >> .env && echo \"DB_DATABASE=${DB_DATABASE#*=}\" >> .env && echo \"DB_USERNAME=${DB_USERNAME#*=}\" >> .env && echo \"DB_PASSWORD=${DB_PASSWORD#*=}\" >> .env && php artisan storage:link 2>/dev/null || true && php artisan config:clear && php artisan view:cache && php artisan package:discover --ansi && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT'"

[healthcheck]
path = "/"
timeout = 300

[variables]
APP_URL = "https://eduaid-scholarship-production.up.railway.app"
APP_KEY = "base64:abcdefghijklmnopqrstuvwxyz1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ"
PHPIZE_DEPS = "libpng-dev libonig-dev"
